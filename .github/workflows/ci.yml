name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend
        run: |
          cd learnmate-backend
          npm ci || npm install

      - name: Run Tests
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/learnmate_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: supersecret
          JWT_REFRESH_SECRET: supersecret_refresh
        run: |
          cd learnmate-backend
          npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Build Frontend
        run: |
          cd learnmate-frontend
          npm ci || npm install
          npm run build
