version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    build: ./learnmate-frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build: ./learnmate-backend
    restart: always
    env_file: .env.production
    depends_on:
      - mongo
      - redis
    deploy:
      resources:
        limits:
          memory: 512M

  ai-worker:
    build: ./AI-Model
    restart: always
    env_file: .env.production
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 512M

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo-data:/data/db
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mongo-data:
